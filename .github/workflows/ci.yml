name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build_and_test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            - name: Setup Bazel
              uses: bazelbuild/setup-bazelisk@v2

            - name: Mount Bazel Cache
              uses: actions/cache@v3
              with:
                  path: "~/.cache/bazel"
                  key: ${{ runner.os }}-bazel-${{ hashFiles('**/BUILD.bazel', '**/*.bzl', 'WORKSPACE') }}
                  restore-keys: |
                      ${{ runner.os }}-bazel-

            - name: Build & Test
              run: ./bazel_ci.sh
