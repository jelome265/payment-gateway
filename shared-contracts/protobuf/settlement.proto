syntax = "proto3";

package warmheart.payments.v1;

import "google/protobuf/timestamp.proto";

message SettlementBatch {
  string id = 1;
  string provider = 2;
  double total_amount = 3;
  string currency = 4;
  google.protobuf.timestamp.Timestamp created_at = 5;
  repeated string transaction_ids = 6;
}
