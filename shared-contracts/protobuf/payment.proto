syntax = "proto3";

package warmheart.payments.v1;

option java_package = "com.company.payments.proto";
option java_multiple_files = true;

message PaymentRequest {
  string customer_id = 1;
  double amount = 2;
  string currency = 3;
  string source = 4;
  string idempotency_key = 5;
}

message PaymentResponse {
  string charge_id = 1;
  string status = 2;
  string error_code = 3;
  string error_message = 4;
}
